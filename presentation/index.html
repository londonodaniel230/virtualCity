<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual City</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../presentation/css/styles.css">
</head>
<body class="bg-light">

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">

                <div id="setup-section" class="card shadow-sm mb-4">
                    <div class="card-header">
                        <h2 class="mb-0">City Setup</h2>
                    </div>

                    <div class="card-body">
                        <form id="city-form" class="row g-3">
                            <div class="col-md-6">
                                <label for="cityName" class="form-label">City Name</label>
                                <input type="text" class="form-control" id="cityName" required>
                            </div>

                            <div class="col-md-6">
                                <label for="mayorName" class="form-label">Mayor Name</label>
                                <input type="text" class="form-control" id="mayorName" required>
                            </div>

                            <div class="col-md-6">
                                <label for="region" class="form-label">Region</label>
                                <input type="text" class="form-control" id="region" required>
                            </div>

                            <div class="col-md-6">
                                <label for="mapSize" class="form-label">Map Size</label>
                                <select class="form-select" id="mapSize" required>
                                    <option value="">Select size</option>
                                    <option value="15">15 x 15</option>
                                    <option value="20">20 x 20</option>
                                    <option value="25">25 x 25</option>
                                    <option value="30">30 x 30</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100">
                                    Create City
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div id="map-section" class="d-none">
                    <div class="map-wrapper">
                        <div id="map-scroll-container">
                            <div id="map-grid"></div>
                        </div>
                    </div>
                </div>

<div id="info-bar" class="d-none">
    <span id="info-text">City information</span>
    <button id="build-road-btn" type="button" class="btn btn-warning btn-sm ms-3">
        Build Road
    </button>
</div>

            </div>
        </div>
    </div>

    <script type="module" src="../main.js"></script>
</body>
</html>
